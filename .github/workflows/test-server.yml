name: Server Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/server/**'
      - 'tests/test_server.py'
      - 'tests/test_*_api.py'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/server/**'
      - 'tests/test_server.py'
      - 'tests/test_*_api.py'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio pytest-cov httpx
    
    - name: Set environment variables
      run: |
        echo "JWT_SECRET_KEY=test-secret-for-ci" >> $GITHUB_ENV
        echo "SKIN_API_MAX_UPLOAD_BYTES=10485760" >> $GITHUB_ENV
        echo "ADMIN_PASSWORD=admin123" >> $GITHUB_ENV
        echo "ANALYST_PASSWORD=analyst123" >> $GITHUB_ENV
    
    - name: Run server tests
      run: |
        python -m pytest tests/test_server.py tests/test_auth_api.py tests/test_admin_api.py tests/test_health_api.py tests/test_orders_api.py -v --cov=src/server --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: server
        name: codecov-server-${{ matrix.python-version }}
        fail_ci_if_error: false
    
    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: server-test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          .coverage
