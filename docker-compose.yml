services:
  # 엔진 서버 (분석 전용)
  skinlens-engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: skinlens-engine
    ports:
      - "8001:8001"
    environment:
      - ENGINE_SERVER_HOST=0.0.0.0
      - ENGINE_SERVER_PORT=8001
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default-secret-key-change-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENABLE_GPU=${ENABLE_GPU:-true}
    volumes:
      - ./jobs:/app/jobs
      - ./models:/app/models
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/engine/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - skinlens-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 웹서버 (API 게이트웨이)
  skinlens-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: skinlens-web
    ports:
      - "8000:8000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - ENGINE_SERVER_URL=http://skinlens-engine:8001
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default-secret-key-change-in-production}
      - SKIN_ANALYSIS_DB=/app/data/skin_analysis.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      - ENABLE_GPU=${ENABLE_GPU:-true}
    volumes:
      - ./jobs:/app/jobs
      - ./results:/app/results
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      skinlens-engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - skinlens-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  skinlens-network:
    driver: bridge
