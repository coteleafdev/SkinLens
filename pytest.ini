[pytest]
# pytest 설정 파일

# 테스트 디렉토리
testpaths = tests

# 테스트 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 출력 옵션
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 마커
markers =
    slow: 마킹된 느린 테스트
    integration: 통합 테스트
    unit: 단위 테스트
    server: 서버 관련 테스트 (서버 의존성 필요)
    db: 데이터베이스 관련 테스트
    requires_jose: jose 모듈 필요
    requires_fastapi: fastapi 모듈 필요

# 로그 설정
log_cli = true
log_cli_level = INFO

# 커버리지 설정 (선택적)
# addopts = --cov=src --cov-report=html --cov-report=term-missing

# 최소 버전
minversion = 7.0
